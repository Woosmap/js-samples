    <style>
      #map {
        height: 100%;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;

          system-ui,

          Roboto,
          Noto Sans,
          Ubuntu,

          Segoe UI Symbol,
          Noto Color Emoji;

      #autocomplete-container {
        z-index: 1;
        box-sizing: border-box;
        cursor: text;
        background: #fff;
        border: none;
        border-radius: 12px;
        align-items: center;
        width: 100%;
        max-width: 320px;
        height: 42px;
        padding: 0 12px;
        font-size: 15px;
        display: flex;
        position: absolute;
        top: 10px;
        left: 10px;
        box-shadow:
          0 2px 4px #0003,
          0 -1px #00000005;
      }
      #autocomplete-container .search-icon,
      #autocomplete-container .clear-icon {
        color: inherit;
        flex-shrink: 0;
        width: 16px;
        height: 16px;
      }
      #autocomplete-container .clear-icon {
        transform: scale(1.3);
      }
      #autocomplete-input {
        box-sizing: border-box;
        vertical-align: top;
        text-overflow: ellipsis;
        -webkit-appearance: textfield;
        -moz-appearance: textfield;
        appearance: textfield;
        background: 0 0;
        border: 0;
        border-radius: 0;
        outline: 0;
        width: 100%;
        height: 40px;
        margin: 0 8px;
        padding: 0;
        font-size: 100%;
        line-height: 24px;
        transition-property: color;
        transition-duration: 0.3s;
        overflow: visible;
      }
      .clear-searchButton {
        vertical-align: middle;
        pointer-events: all;
        cursor: pointer;
        background: 0 0;
        border: none;
        width: 22px;
        height: 18px;
        display: none;
      }

        list-style: none;
        display: none;
        position: absolute;

        left: 0;
        overflow-y: auto;
        box-shadow:

          0 -1px #00000005;
      }

      }

      }

        left: 0;
      }

      }

      </p>
      <form id="address-form" action="" method="get" autocomplete="off">

                fill-rule="evenodd"
                clip-rule="evenodd"
              ></path>
            </svg>

            <input
              type="text"
              id="autocomplete-input"
              name="autocomplete-input"
              placeholder="Search an address..."
              autocomplete="off"
            />

        </div>

            >Apartment, unit, suite, or floor #</label
          >
          <div class="input-wrapper">
            <input id="address2" name="address2" />
          </div>
        </div>
        <div class="full-field">
          <label class="form-label" for="locality">City*</label>
          <div class="input-wrapper">
            <input id="locality" name="locality" required />
          </div>
        </div>
        <div class="field-left">
          <label class="form-label" for="state">State/Province*</label>
          <div class="input-wrapper">
            <input id="state" name="state" required />
          </div>
        </div>
        <div class="field-right">
          <label class="form-label" for="postcode">Postal code*</label>
          <div class="input-wrapper">
            <input id="postcode" name="postcode" required />
          </div>
        </div>
        <div class="full-field">
          <label class="form-label" for="country">Country/Region*</label>
          <div class="input-wrapper">
            <input id="country" name="country" required />
          </div>
        </div>
      </form>
    </div>
