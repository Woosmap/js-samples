<!DOCTYPE html>
<!-- [START woosmap_vector_map] -->
<html>
  <head>
    <title>Vector Map</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta charset="utf-8" />

    <link rel="stylesheet" type="text/css" href="./style.css" />
    <script type="module" src="./index.js"></script>
  </head>
  <body>
    <div id="map-panel">
      <label class="toggle">
        <span class="toggle-label">Buildings</span>
        <input class="toggle-checkbox" type="checkbox" id="toggleBuildings" />
        <div class="toggle-switch"></div>
      </label>
    </div>
    <!-- [START woosmap_vector_map_div] -->
    <!--The div element for the map -->
    <div id="map"></div>
    <!-- [END woosmap_vector_map_div] -->

    <script
      src="https://sdk.woosmap.com/map/map.js?key=woos-e1e5490b-19d1-34f8-9955-fd5cfc8c880f&callback=initMap"
      defer
    ></script>
  </body>
</html>
<!-- [END woosmap_vector_map] -->
