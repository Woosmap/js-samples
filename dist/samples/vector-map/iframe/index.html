<html>

    <style>
      #map {
        height: 100%;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          Segoe UI,
          Roboto,
          Noto Sans,
          Ubuntu,
          Cantarell,
          Helvetica Neue,
          Arial,
          sans-serif,
          Apple Color Emoji,
          Segoe UI Emoji,
          Segoe UI Symbol,
          Noto Color Emoji;
      }
      .toggle {
        cursor: pointer;
        display: inline-block;
      }
      .toggle:hover .toggle-switch:before {
        background: linear-gradient(#fff 0%, #fff 100%);
        box-shadow: 0 0 0 1px #00000080;
      }
      .toggle-switch {
        vertical-align: middle;
        background: #ccc;
        border-radius: 16px;
        width: 58px;
        height: 32px;
        transition: background 0.25s;
        display: inline-block;
        position: relative;
      }
      .toggle-switch:before {
        content: "";
        background: linear-gradient(#fff 0%, #eee 100%);
        border-radius: 50%;
        width: 24px;
        height: 24px;
        transition: left 0.25s;
        display: block;
        position: absolute;
        top: 4px;
        left: 4px;
        box-shadow: 0 0 0 1px #00000040;
      }
      .toggle-switch:after {
        content: "";
      }
      .toggle-checkbox:checked + .toggle-switch {
        background: #56c080;
      }
      .toggle-checkbox:checked + .toggle-switch:before {
        left: 30px;
      }
      .toggle-checkbox {
        visibility: hidden;
        position: absolute;
      }
      .toggle-label {
        margin-left: 5px;
        position: relative;
        top: 2px;
      }
      #map-panel {
        z-index: 1;
        background-color: #fff;
        border-radius: 3px;
        margin: 10px;
        padding: 5px;
        position: absolute;
        top: 0;
        left: 0;
        overflow: hidden;
        box-shadow: 0 0 0 2px #0000001a;
      }
    </style>
  </head>
  <body>
    <div id="map-panel">
      <label class="toggle">
        <span class="toggle-label">Buildings</span>
        <input class="toggle-checkbox" type="checkbox" id="toggleBuildings" />
        <div class="toggle-switch"></div>
      </label>
    </div>
    <!--The div element for the map -->
    <div id="map"></div>

    <script
      src="https://sdk.woosmap.com/map/map.js?key=woos-48c80350-88aa-333e-835a-07f4b658a9a4&callback=initMap"
      defer
    ></script>
  </body>
</html>
